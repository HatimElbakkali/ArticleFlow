<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="style/style.css" />
</head>

<body>
  <header>
    <h1 class="Titre">Gestionnaire d'article</h1>
  </header>
  <nav>
    <input class="search" type="text" placeholder="Recherch un article..." />
    <select name="" id="categorie">
      <option value=""></option>
      <option value="All">All</option>
      <option value="tech">Tech</option>
      <option value="design">design</option>
      <option value="marketing" >Marketing</option>
    </select>
    <select id="arrangement">
      <option>Plus Recent</option>
      <option value="A-Z">A-Z</option>
      <option value="Z-A" >Z-A</option>
    </select>
    <button class="Favoris-uniquement">Favoris uniquement</button>
    <button class="Addition">+ Ajouter</button>
  </nav>

  <h2 class="number-of-article">Articles affiche: 5</h2>
  <div class="container-article"></div>

  <div class="container-form">
    <form action="">
      <h1>Nouvel Article</h1>
      <input class="titre" type="text" placeholder="Titre">
      <textarea class="Resume99" name="" id="" placeholder="resume"></textarea>
      <input class="auteur" type="text" placeholder="auteur">

      <select class="Tags" name="" id="">
        <option value="Tech">Tech</option>
        <option value="design">design</option>
        <option value="Marketing" >Marketing</option>
      </select>

      <div>
        <button class="btn-valider" type="submit">Valider</button>
        <button class="btn-annuler">Annuler</button>
      </div>
    </form>
  </div>
  <div class="titre"></div>
</body>
<script type="module" src="script/script.js"></script>

</html>
